services:
  postgres:
    image: postgres:15-alpine
    container_name: cygnus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi_pwd}
      POSTGRES_DB: ${DATABASE_NAME:-cygnus_cms}
    volumes:
      - cygnus_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-strapi} -d ${DATABASE_NAME:-cygnus_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    image: strapi/strapi:latest
    container_name: cygnus_cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-cygnus_cms}
      DATABASE_USERNAME: ${DATABASE_USER:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi_pwd}
      NODE_ENV: development
    volumes:
      - ./cms:/opt/app
    ports:
      - "1337:1337"

volumes:
  cygnus_postgres_data:
